# Documentation-only example.
# The primary interface owns the default route.
# The secondary interface has only an explicit route to a backup network.
network:
  version: 2
  renderer: networkd
  ethernets:
    ens160:
      dhcp4: false
      dhcp6: false
      addresses:
        - 192.0.2.20/24
      nameservers:
        search:
          - corp.example.com
        addresses:
          - 192.0.2.53
          - 192.0.2.54
      routes:
        - to: default
          via: 192.0.2.1

    ens192:
      dhcp4: false
      dhcp6: false
      addresses:
        - 198.51.100.20/24
      routes:
        - to: 203.0.113.0/24
          via: 198.51.100.1
