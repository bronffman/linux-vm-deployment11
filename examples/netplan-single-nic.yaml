# Documentation-only example.
# Replace all values with data from your IPAM/DNS system.
network:
  version: 2
  renderer: networkd
  ethernets:
    ens160:
      dhcp4: false
      dhcp6: false
      addresses:
        - 192.0.2.20/24
      nameservers:
        search:
          - corp.example.com
        addresses:
          - 192.0.2.53
          - 192.0.2.54
      routes:
        - to: default
          via: 192.0.2.1
